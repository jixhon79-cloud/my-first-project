<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Евгений Теребилкин</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    z-index: 0;
    opacity: 0.6;
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(0, 10, 0, 0.85);
    border: 2px solid #00ff41;
    border-radius: 4px;
    padding: 48px 40px;
    max-width: 420px;
    width: 90vw;
    text-align: center;
    box-shadow:
      0 0 0 1px #003b00,
      0 0 0 4px #001a00,
      4px 4px 0 4px #00ff41,
      8px 8px 0 4px #008f11,
      12px 12px 0 4px #003b00,
      0 30px 60px rgba(0,0,0,0.8),
      0 0 60px rgba(0,255,65,0.15),
      inset 0 0 40px rgba(0,255,65,0.03);
    animation: fadeIn 1s ease;
    transform: perspective(800px) rotateX(1deg);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin: 0 auto 20px;
    background: #000;
    border: 2px solid #00ff41;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,255,65,0.4), inset 0 0 20px rgba(0,255,65,0.1);
    animation: glow 2s ease-in-out infinite;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  @keyframes glow {
    0%, 100% { box-shadow: 0 0 20px rgba(0,255,65,0.4), inset 0 0 20px rgba(0,255,65,0.1); }
    50% { box-shadow: 0 0 40px rgba(0,255,65,0.7), inset 0 0 30px rgba(0,255,65,0.2); }
  }

  .name {
    font-size: 22px;
    font-weight: 700;
    color: #00ff41;
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(0,255,65,0.5);
  }

  .role {
    font-size: 13px;
    color: #008f11;
    margin-bottom: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .typing {
    font-size: 12px;
    color: #00ff41;
    margin-bottom: 32px;
    opacity: 0.7;
    min-height: 18px;
  }

  .divider {
    border: none;
    border-top: 1px solid #003b00;
    margin: 0 0 28px;
  }

  .info-line {
    font-size: 12px;
    color: #008f11;
    text-align: left;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .info-line span {
    color: #00ff41;
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 28px 0;
  }

  .social-btn {
    width: 52px;
    height: 52px;
    border: 2px solid #00ff41;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    box-shadow: 3px 3px 0 #008f11, 6px 6px 0 #003b00;
  }

  .social-btn:hover {
    background: rgba(0,255,65,0.1);
    box-shadow: 4px 4px 0 #00ff41, 8px 8px 0 #008f11, 0 0 20px rgba(0,255,65,0.4);
    transform: translateY(-3px);
  }

  .social-btn svg { width: 22px; height: 22px; }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: #00ff41;
    text-decoration: none;
    padding: 14px 32px;
    border: 1px solid #00ff41;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .cta::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(0,255,65,0.1);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
  }

  .cta:hover::before { transform: scaleX(1); }
  .cta {
    box-shadow: 4px 4px 0 #008f11, 8px 8px 0 #003b00;
  }
  .cta:hover { box-shadow: 5px 5px 0 #00ff41, 10px 10px 0 #008f11, 0 0 30px rgba(0,255,65,0.4); transform: translate(-2px, -2px); }
  .cta svg { width: 16px; height: 16px; fill: #00ff41; position: relative; z-index: 1; }
  .cta span { position: relative; z-index: 1; }

  .tag {
    display: block;
    margin-top: 24px;
    font-size: 10px;
    color: #003b00;
    letter-spacing: 2px;
  }

  .cursor {
    display: inline-block;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>

<script>
// Матрица
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789ABCDEF';
const fontSize = 14;
const cols = Math.floor(canvas.width / fontSize);
const drops = Array(cols).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = fontSize + 'px Courier New';
  drops.forEach((y, i) => {
    const char = chars[Math.floor(Math.random() * chars.length)];
    // Первый символ (голова) — ярко-белый с свечением
    if (Math.random() > 0.9) {
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#ffffff';
      ctx.fillStyle = '#ffffff';
    } else {
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#00ff41';
      ctx.fillStyle = '#00ff41';
    }
    ctx.fillText(char, i * fontSize, y * fontSize);
    ctx.shadowBlur = 0;
    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}
setInterval(drawMatrix, 50);

// Печатающийся текст
const phrases = ['> Инициализация...', '> Загрузка профиля...', '> ДОСТУП РАЗРЕШЁН_'];
let pi = 0, ci = 0;
const el = document.getElementById('typing');
function type() {
  if (ci < phrases[pi].length) {
    el.textContent = phrases[pi].slice(0, ++ci) + '█';
    setTimeout(type, 60);
  } else {
    setTimeout(() => {
      pi = (pi + 1) % phrases.length;
      ci = 0;
      type();
    }, 1500);
  }
}
type();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
